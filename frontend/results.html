<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Results</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="logo">📈 Clustering Results</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="upload.html">Upload</a></li>
      <li><a class="active" href="results.html">Results</a></li>
    </ul>
  </nav>

  <section class="results">
    <h2>PCA Scatter Plot</h2>
    <div id="chart" style="width:90%;max-width:1000px;height:500px;margin:0 auto"></div>
    <h3 id="metrics" style="text-align:center;margin-top:16px"></h3>
    <div style="text-align:center;margin-top:12px">
      <a id="downloadLink" class="btn" href="#">Download Clustered CSV</a>
    </div>
  </section>

  <script>
  (function(){
    const results = JSON.parse(localStorage.getItem('results') || '{}');
    if (!results || !results.pca) {
      document.getElementById('chart').innerHTML = '<p style="text-align:center;color:#ccc">No results available. Run an analysis first.</p>';
      return;
    }
    const groups = {};
    results.pca.forEach(p => {
      if (!groups[p.cluster]) groups[p.cluster] = [];
      groups[p.cluster].push(p);
    });
    const traces = Object.keys(groups).map(clusterId => {
      const pts = groups[clusterId];
      return {
        x: pts.map(p => p.x),
        y: pts.map(p => p.y),
        mode: 'markers',
        type: 'scatter',
        name: 'Cluster ' + clusterId,
        text: pts.map(p => (p.id ? `id:${p.id}<br>ott:${p.ott||''}<br>time:${p.screen_time||''}` : `time:${p.screen_time||''}`)),
        hoverinfo: 'text'
      };
    });
    Plotly.newPlot('chart', traces, { margin:{t:30}, paper_bgcolor:'#0f1114', plot_bgcolor:'#0f1114', font:{color:'#e6e6e6'} });
    document.getElementById('metrics').innerText = `Silhouette: ${results.silhouette} | Davies-Bouldin: ${results.db_index}`;
    document.getElementById('downloadLink').href = '/api/download/' + results.run_id;
  })();
  </script>

  <footer></footer>
</body>
</html>
