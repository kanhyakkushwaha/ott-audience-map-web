<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Upload Dataset</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">📊 Upload Dataset</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a class="active" href="upload.html">Upload</a></li>
      <li><a href="results.html">Results</a></li>
    </ul>
  </nav>

  <section class="upload-container">
    <h2>Upload Your CSV File</h2>
    <input type="file" id="fileInput" accept=".csv"><br>

    <label>Number of Clusters (k): <span id="kValueDisplay">3</span></label>
    <input type="range" id="kValue" min="2" max="8" value="3" oninput="document.getElementById('kValueDisplay').innerText=this.value">

    <label style="display:block;margin-top:12px;">
      <input type="checkbox" id="scaleToggle"> Enable Feature Scaling
    </label>

    <button class="btn" onclick="uploadAndRun()">Upload & Analyze</button>
    <p id="status"></p>
  </section>

  <script src="js/upload.js"></script>
  <footer></footer>
</body>
</html>
